name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'


# --- START OF DEBUG STEP ---
    - name: Debug Secret Presence
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
          echo "❌ DOCKER_USERNAME is EMPTY. Check your secret names in GitHub Settings!"
          exit 1
        else
          echo "✅ DOCKER_USERNAME is found!"
        fi
    # --- END OF DEBUG STEP ---

    - name: Build with Maven
      run: mvn clean package

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-java-app .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-java-app